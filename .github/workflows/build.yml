name: Build & Release

# Dispara en tags semánticos (v1.2.3) y en ejecución manual para pruebas.
# El job "release" solo corre en tags — así podés hacer un build de prueba
# con workflow_dispatch sin crear un Release en GitHub.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version_label:
        description: 'Etiqueta de versión para el artifact (ej: dev, v1.0.0-test)'
        required: false
        default: 'dev'

permissions:
  contents: write   # requerido por softprops/action-gh-release para crear releases

# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build:
    name: Build — ${{ matrix.os-label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      # Permito que ambas plataformas terminen aunque una falle,
      # así el error no borra el artifact de la otra plataforma.
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            os-label: Windows x64
            artifact-name: BGRemover-windows-x64
            artifact-ext: .zip

          - runner: ubuntu-22.04
            os-label: Linux x64
            artifact-name: BGRemover-linux-x64
            artifact-ext: .AppImage

    steps:
      # ── 1. Código fuente ──────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Python 3.12 con caché de pip ───────────────────────────────────
      # La caché se invalida cuando cambia requirements.txt, evitando
      # re-descargar los wheels (~500 MB de onnxruntime, torch, etc.) en cada run.
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      # ── 3. Dependencias del sistema (solo Linux) ──────────────────────────
      # tkinter no viene en los runners de Ubuntu por defecto.
      # libgl1 + libglib2.0 son requeridos por opencv-python en modo headless.
      # libgomp1 es necesario para onnxruntime (paralelismo OpenMP).
      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            python3-tk \
            libglib2.0-0 \
            libgl1 \
            libgomp1 \
            libxcb-xinerama0 \
            libdbus-1-3 \
            fuse libfuse2   # requerido por appimagetool en el runner

      # ── 4. Dependencias Python ────────────────────────────────────────────
      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      # ── 5. Compilación ────────────────────────────────────────────────────
      - name: Build with PyInstaller
        run: pyinstaller bgremover.spec

      # ── 6a. Empaquetado Windows → ZIP ─────────────────────────────────────
      - name: Package (Windows → ZIP)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $name = "${{ matrix.artifact-name }}"
          # Comprimo el contenido de la carpeta, no la carpeta en sí,
          # para que el usuario extraiga y vea BGRemover.exe directamente.
          Compress-Archive -Path dist/BGRemover/* -DestinationPath "$name.zip"
          echo "ARTIFACT_PATH=$name.zip" >> $env:GITHUB_ENV

      # ── 6b. Empaquetado Linux → AppImage ──────────────────────────────────
      # Un AppImage es un único archivo ejecutable portable que funciona en
      # cualquier distro moderna sin instalar dependencias del sistema.
      - name: Package (Linux → AppImage)
        if: runner.os == 'Linux'
        run: |
          NAME="${{ matrix.artifact-name }}"

          # Descargo appimagetool desde el release oficial
          wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage" \
               -O appimagetool
          chmod +x appimagetool

          # Armo el AppDir con la estructura estándar de AppImage
          mkdir -p AppDir/usr/bin
          cp -r dist/BGRemover/* AppDir/usr/bin/

          # Copio los archivos de integración de escritorio
          cp .github/appimage/BGRemover.desktop AppDir/
          cp .github/appimage/AppRun           AppDir/
          chmod +x AppDir/AppRun

          # Ícono: uso assets/icon.png si existe, sino genero un placeholder.
          # Para un release real, agregá assets/icon.png (256×256 px, RGBA PNG).
          if [ -f assets/icon.png ]; then
            cp assets/icon.png AppDir/BGRemover.png
          else
            python3 -c "
          from PIL import Image, ImageDraw
          img = Image.new('RGBA', (256, 256), (25, 25, 25, 255))
          d = ImageDraw.Draw(img)
          d.ellipse([32, 32, 224, 224], fill=(70, 130, 180, 255))
          img.save('AppDir/BGRemover.png')
          "
          fi

          # Genero el AppImage — ARCH fuerza la arquitectura en el nombre interno
          ARCH=x86_64 ./appimagetool --no-appstream AppDir "${NAME}.AppImage"

          echo "ARTIFACT_PATH=${NAME}.AppImage" >> $GITHUB_ENV

      # ── 7. Subida de artifacts ────────────────────────────────────────────
      # Los artifacts quedan disponibles 30 días en la pestaña Actions
      # y son descargados por el job "release" para adjuntarlos al Release.
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ env.ARTIFACT_PATH }}
          retention-days: 30
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: build
    # Solo corre cuando el trigger es un tag semántico — nunca en workflow_dispatch
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      # Descargo todos los artifacts del job anterior en un único directorio
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      # Pre-release automático si el tag contiene un guión (v1.0.0-beta.1)
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: BGRemover ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/*.zip
            artifacts/*.AppImage
          body: |
            ## BGRemover ${{ github.ref_name }}

            ### Descargas

            | Plataforma | Archivo | Instrucciones |
            |---|---|---|
            | **Windows 10/11** (x64) | `BGRemover-windows-x64.zip` | Extraer y ejecutar `BGRemover.exe` |
            | **Linux** (x64) | `BGRemover-linux-x64.AppImage` | `chmod +x BGRemover-linux-x64.AppImage && ./BGRemover-linux-x64.AppImage` |

            > **Primer uso:** el modelo BiRefNet (~170 MB) se descarga automáticamente en `~/.u2net/`.
            > Una vez descargado, la app funciona sin internet.
