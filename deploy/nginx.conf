# /etc/nginx/sites-available/bgremover.tutansoft.com
# Redirige HTTP → HTTPS y hace proxy a Gunicorn en el puerto 8001.

server {
    listen 80;
    listen [::]:80;
    server_name bgremover.tutansoft.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name bgremover.tutansoft.com;

    ssl_certificate     /etc/letsencrypt/live/bgremover.tutansoft.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bgremover.tutansoft.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/bgremover.tutansoft.com/html;

    # Imágenes pueden ser grandes.
    client_max_body_size 20M;

    # ISNet en CPU tarda 5–30 s; sin estos valores nginx cierra la conexión antes.
    proxy_read_timeout    120s;
    proxy_send_timeout    120s;
    proxy_connect_timeout  10s;

    location /api/ {
        proxy_pass         http://127.0.0.1:8001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
    }

    location = /health {
        proxy_pass  http://127.0.0.1:8001/api/v1/health;
        access_log  off;
    }

    # PHP vía php8.3-fpm (mismo que usan los otros sitios del servidor).
    location ~ \.php$ {
        include        snippets/fastcgi-php.conf;
        fastcgi_pass   unix:/run/php/php8.3-fpm.sock;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include        fastcgi_params;
    }

    # Cualquier otra ruta sirve los archivos estáticos del html/.
    location / {
        try_files $uri $uri/ =404;
    }
}
